<p-toast></p-toast>

<div class="page">
    <header class="head">
        <h1>Groups</h1>
        <p>Gestión de grupos.</p>
    </header>

    <p-card class="card" header="Lista de grupos">
        <div class="toolbar">
            <span class="p-input-icon-left">
                <i class="pi pi-search"></i>
                <input pInputText [(ngModel)]="q" placeholder="Buscar grupo..." />
            </span>

            <button pButton type="button" label="Nuevo grupo" icon="pi pi-plus" (click)="openCreate()"></button>
        </div>

        <p-table [value]="filtered()" [paginator]="true" [rows]="7" [rowsPerPageOptions]="[7,10,20]"
            [tableStyle]="{ 'min-width': '100%' }" styleClass="p-datatable-sm">

            <ng-template pTemplate="header">
                <tr>
                    <th>Nombre</th>
                    <th>Nivel</th>
                    <th>Autor</th>
                    <th>Integrantes</th>
                    <th>Tickets</th>
                    <th>Estatus</th>
                    <th style="width: 160px;">Acciones</th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-row>
                <tr>
                    <td class="gname">
                        <span class="badge"><i class="pi pi-sitemap"></i></span>
                        <div class="gmeta">
                            <span class="title">{{ row.nombre }}</span>
                            <small class="desc">{{ row.descripcion }}</small>
                        </div>
                    </td>

                    <td>{{ row.nivel }}</td>
                    <td>{{ row.autor }}</td>
                    <td>{{ row.integrantes }}</td>
                    <td>{{ row.tickets }}</td>

                    <td>
                        <p-tag [value]="row.estatus" [severity]="statusSeverity(row.estatus)"></p-tag>
                    </td>

                    <td>
                        <div class="actions">
                            <button pButton type="button" icon="pi pi-pencil" severity="secondary" rounded
                                (click)="openEdit(row)"></button>
                            <button pButton type="button" icon="pi pi-trash" severity="danger" rounded
                                (click)="remove(row)"></button>
                        </div>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </p-card>
</div>

<p-dialog [(visible)]="dialogOpen" [modal]="true" [draggable]="false" [resizable]="false"
    [style]="{ width: '720px', maxWidth: '92vw' }" [header]="isEdit ? 'Editar grupo' : 'Nuevo grupo'">

    <div class="dlgGrid">
        <div class="field">
            <label>Nombre</label>
            <input pInputText [(ngModel)]="draft.nombre" placeholder="Nombre del grupo" />
        </div>

        <div class="field">
            <label>Nivel</label>
            <p-select [options]="nivelOptions" optionLabel="label" optionValue="value" [(ngModel)]="draft.nivel"
                placeholder="Selecciona">
            </p-select>
        </div>

        <div class="field">
            <label>Autor</label>
            <input pInputText [(ngModel)]="draft.autor" placeholder="Autor" />
        </div>

        <div class="field">
            <label>Estatus</label>
            <p-select [options]="statusOptions" optionLabel="label" optionValue="value" [(ngModel)]="draft.estatus">
            </p-select>
        </div>

        <div class="field">
            <label>Integrantes</label>
            <p-inputNumber [(ngModel)]="draft.integrantes" [min]="1"></p-inputNumber>
        </div>

        <div class="field">
            <label>Tickets</label>
            <p-inputNumber [(ngModel)]="draft.tickets" [min]="0"></p-inputNumber>
        </div>

        <div class="field full">
            <label>Descripción</label>
            <textarea pTextarea [(ngModel)]="draft.descripcion" rows="3" placeholder="Descripción del grupo"></textarea>
        </div>
    </div>

    <div class="dlgActions">
        <button pButton type="button" label="Cancelar" severity="secondary" (click)="dialogOpen=false"></button>
        <button pButton type="button" label="Guardar" icon="pi pi-check" (click)="save()"></button>
    </div>
</p-dialog>
